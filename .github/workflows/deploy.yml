name: Portfolio Continous Deployment

on:
  push:
    branches: [main]

jobs:
  deploy: 
    runs-on: ubuntu-latest
    steps:
      - name: Initial steps
        uses: actions/checkout@v2
        uses: actions/setup-node@v2
        with:
          node-version: 14
        run : npm ci

      - name: Production build & purge tailwind css
        run : npm run prod:build

      - name: Deploy to github page
        run : npm run deploy
    